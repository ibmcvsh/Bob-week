      **BOM Reserved Keywords (CRITICAL - Discovered from Aviation Compliance Project):**
      1. **"operator" is a RESERVED KEYWORD in BOM syntax** - causes compilation errors
         - WRONG XOM property name: private Operator operator;
         - CORRECT XOM property name: private Operator airlineOperator;
         - When you encounter "operator" as a property name, ALWAYS rename it in XOM
         - Update all references in BOM, vocabulary, and rules after renaming
         - Other known reserved keywords to avoid: "function", "rule", "package", "import"

      2. **Deployment Configuration Requirements (CRITICAL):**
         - The .dep file MUST include ruleAppName attribute in root element
         - WRONG: <com.ibm.rules.studio.model.decisionservice:Deployment xmi:version="2.0" ...>
         - CORRECT: <com.ibm.rules.studio.model.decisionservice:Deployment xmi:version="2.0" ... ruleAppName="ProjectName" managingXom="true">
         - Without ruleAppName, Build Command fails with "A RuleApp name cannot be empty"
         - The ruleAppName should match the project name without spaces (use camelCase)

      3. **Build Properties File Configuration:**
         - When creating buildcommand/samples/config-files/[ProjectName].properties, include:
           * project = ../../../[ProjectName]
           * output = ../../../[ProjectName]/output
           * dep = [ProjectName]  (this becomes the RuleApp JAR filename prefix)
           * xom-classpath = ../../../[xom-project-name]/[xom-project-name]-1.0.0.jar
           * ruleapp-name = ProjectName  (optional but recommended for clarity)

      4. **Vocabulary Phrase Ambiguity Prevention:**
         - Avoid using common words that appear in multiple phrase contexts
         - Words like "overall", "compliance", "total", "count" can cause ambiguity
         - When a vocabulary phrase causes "Ambiguous sentence" errors, use more specific terms
         - Example: Instead of "overall violations", use "recorded violations" or "detected violations"
         - Test vocabulary phrases by ensuring they don't share common prefix patterns

      5. **Collection Property Access in Rules:**
         - When checking if a collection is empty, use vocabulary method phrases, not direct property access
         - WRONG: the violations of 'the request' is empty
         - CORRECT: Create a computed boolean property in XOM: public boolean hasAnyViolations()
         - Then use vocabulary: ComplianceRequest.anyViolations#phrase.navigation = {this} has violations
         - Rule: it is not true that 'the request' has violations
      **PROVEN PATTERNS FROM SUCCESSFUL BUILD (Aviation Compliance Project):**

      These patterns were validated through iterative Build Command testing and represent working solutions to common ODM compilation challenges.

      **1. Computed Property Pattern in BOM:**
         - Computed properties (XOM methods with no setter) MUST be declared in BOM with specific annotations
         - Pattern for numeric computed properties:
           XOM: public double getCo2PerRpk() { return co2EmissionsKg / (passengerCount * distanceKm); }
           BOM: public readonly double co2PerRpk property "factory.ignore" "true";
           Vocabulary: Flight.co2PerRpk#phrase.navigation = {CO2 per RPK} of {this}
         - Pattern for boolean computed properties:
           XOM: public boolean isCertifiedAfter2025() { return certificationDate.after(new Date(2025, 0, 1)); }
           BOM: public readonly boolean certifiedAfter2025 property "factory.ignore" "true";
           Vocabulary: Aircraft.certifiedAfter2025#phrase.navigation = {this} is certified after 2025
         - The "factory.ignore" annotation prevents ODM from trying to instantiate via this property
         - The readonly modifier indicates the property cannot be modified in rules

      **2. Property Naming Consistency Across Layers:**
         - XOM property name: private Operator airlineOperator;
         - XOM getter: public Operator getAirlineOperator()
         - XOM setter: public void setAirlineOperator(Operator airlineOperator)
         - BOM property: public com.aviation.compliance.Operator airlineOperator;
         - Vocabulary navigation: ComplianceRequest.airlineOperator#phrase.navigation = {airline operator} of {this}
         - Vocabulary action: ComplianceRequest.airlineOperator#phrase.action = set the airline operator of {this} to {airline operator}
         - Rule usage: the airline operator of 'the request'
         - CRITICAL: All layers must use the same base property name (airlineOperator), not reserved keywords

      **3. Collection Property Patterns:**
         - Collections in BOM: public readonly java.util.Collection violations domain 0,* class string;
         - Always use readonly for collections to prevent replacement, only allow add/remove operations
         - Vocabulary for collection: Flight.violations#phrase.navigation = {violations} of {this}
         - Vocabulary for add method: Flight.addViolation(java.lang.String)#phrase.action = add {0} to the violations of {this}
         - Rule usage: add "violation message" to the violations of the flight of 'the request' ;
         - NEVER try to check if collection is empty directly - use computed boolean property instead

      **4. Multi-Action Rule Pattern (CRITICAL):**
         - When 'then' clause has multiple actions, EVERY action MUST end with semicolon
         - Pattern:
           if
             condition1
             and condition2
           then
             action1 ;
             action2 ;
             action3 ;
         - Real example from Aviation Compliance:
           if
             the airline operator of 'the request' is not null
             and the offset deficit of the airline operator of 'the request' is more than 0
           then
             add ( the offset deficit of the airline operator of 'the request' * 100 ) to the penalty amount of the airline operator of 'the request' ;
             add ( the offset deficit of the airline operator of 'the request' * 100 ) to the total penalty amount of 'the request' ;
             add "Section 7.1: Penalty of $100 per metric ton for unoffset CO2" to the messages of the airline operator of 'the request' ;

      **5. Null-Safe Navigation Pattern:**
         - ALWAYS check intermediate objects for null before accessing their properties
         - Pattern:
           if
             the parent of 'the request' is not null
             and the child of the parent of 'the request' is not null
             and the property of the child of the parent of 'the request' is more than 100
           then
             action ;
         - Real example:
           if
             the flight of 'the request' is not null
             and the aircraft of 'the request' is not null
             and the aircraft of 'the request' is certified after 2025
             and the CO2 per RPK of the flight of 'the request' is more than 85
           then
             add "violation message" to the violations of the flight of 'the request' ;

      **6. Vocabulary Phrase Disambiguation Strategy:**
         - When two phrases share common prefix tokens, ODM parser gets confused
         - WRONG: Both "add {0} to the violations of {this}" and "add {0} to the messages of {this}" start with "add {0} to the"
         - SOLUTION: Use distinct opening tokens or different verb patterns
         - CORRECT: "add {0} to the violations of {this}" vs "record message {0} on {this}"
         - Aviation Compliance uses consistent "add {0} to the X of {this}" pattern successfully because:
           * Each collection has a unique name (violations, messages, overallViolations, overallMessages)
           * The full phrase including collection name is unique
           * No two phrases share the exact same token sequence

      **7. Arithmetic Expression Pattern in Rules:**
         - Arithmetic operations in BAL use standard operators: + - * /
         - Parentheses are required for complex expressions
         - Pattern: add ( expression1 * expression2 ) to the property of 'the variable' ;
         - Real example: add ( the offset deficit of the airline operator of 'the request' * 100 ) to the penalty amount of the airline operator of 'the request' ;
         - String concatenation uses + operator: "text " + the property of 'the variable' + " more text"
         - Real example: "Section 3.1: Insufficient offset credits purchased - deficit of " + the offset deficit of the airline operator of 'the request' + " metric tons"

      **8. Boolean Property Vocabulary Patterns:**
         - For boolean properties with standard getter/setter:
           XOM: private boolean meetsGaea2025Standard; with isMetGaea2025Standard() and setMeetsGaea2025Standard()
           BOM: public boolean meetsGaea2025Standard; (auto-mapped)
           Vocabulary navigation: Aircraft.meetsGaea2025Standard#phrase.navigation = {this} meets GAEA 2025 standard
           Vocabulary action: Aircraft.meetsGaea2025Standard#phrase.action = make it {meets GAEA 2025 standard} that {this} meets GAEA 2025 standard
           Rule condition: the aircraft of 'the request' meets GAEA 2025 standard
           Rule negation: it is not true that the aircraft of 'the request' meets GAEA 2025 standard
         - For computed boolean properties (no setter):
           XOM: public boolean isCertifiedAfter2025() { return ...; } (no setter)
           BOM: public readonly boolean certifiedAfter2025 property "factory.ignore" "true";
           Vocabulary: Aircraft.certifiedAfter2025#phrase.navigation = {this} is certified after 2025
           Rule: the aircraft of 'the request' is certified after 2025

      **9. Successful Vocabulary Naming Conventions:**
         - Use descriptive, domain-specific terms that avoid ODM reserved keywords
         - SAFE terms used in Aviation Compliance: airline operator, flight, aircraft, compliance request, violations, messages, emissions, offset, penalty
         - AVOIDED terms: operator (reserved), overall (ambiguous), total (ambiguous), count (ambiguous)
         - When a term causes conflicts, add qualifying prefix: "airline operator" instead of "operator"
         - Collection names should be plural and descriptive: violations, messages, overallViolations, overallMessages

      **10. Working BOM Structure Pattern:**
          - Start with property declarations (loadGetterSetterAsProperties, origin, uuid)
          - Declare package
          - For each class:
            * Declare all simple properties (auto-mapped from XOM getters/setters)
            * Declare computed properties with factory.ignore annotation
            * Declare collections as readonly with domain specification
            * Declare constructors with forConversion annotation for primary constructor
            * Declare default constructor
            * Declare methods (add, remove, compute, etc.)
          - Real example structure from Aviation Compliance ComplianceRequest:
            public com.aviation.compliance.Flight flight;
            public com.aviation.compliance.Aircraft aircraft;
            public com.aviation.compliance.Operator airlineOperator;
            public readonly java.util.Collection overallViolations domain 0,* class string;
            public readonly java.util.Collection overallMessages domain 0,* class string;
            public string overallComplianceStatus;
            public double totalPenaltyAmount;
            public ComplianceRequest(Flight, Aircraft, Operator) property "ilog.rules.engine.dataio.forConversion" "true";
            public ComplianceRequest();
            public void addOverallViolation(string arg);
            public void addOverallMessage(string arg);
            public void addToPenalty(double arg);

      **Decision Table Template (.dta) for Scoring Applications:**

      Decision tables are ideal for scoring, rating, and classification rules where multiple conditions map to specific actions or values. They provide a tabular view that's easier to maintain than multiple individual rules.
      A decision table groups rules that have similar conditions and actions, and helps you spot problems such as overlaps and gaps among the rules.
      A decision table contains rows and columns that work together to form rules. The decision engine executes the rules row by row, from the first row to the last row.
      When an application calls a decision table, the action rules are executed. If the conditions in a row are met, the rule that is formed by the row performs the actions in the row.
      You can add rows to the decision table and enter values in their cells to create new rules. You can also define preconditions that apply to all the rules in a table.

      **When to Use Decision Tables:**
      - Scoring applications (credit scoring, risk assessment, eligibility determination)
      - Rating systems (insurance premiums, pricing tiers, service levels)
      - Classification rules (categorization based on multiple criteria)
      - Lookup tables with range-based conditions
      - Any scenario with multiple condition-action combinations

      **Decision Table Structure:**
      <?xml version="1.0" encoding="UTF-8"?>
      <model.dt:DecisionTable xmi:version="2.0" xmlns:xmi="http://www.omg.org/XMI" xmlns:model.dt="http://ilog.rules.studio/model/dt.ecore">
        <name>scoring-table-name</name>
        <uuid>unique-decision-table-uuid</uuid>
        <categories>any</categories>
        <locale>en_US</locale>
        <definition>
      <DT xmlns="http://schemas.ilog.com/Rules/7.0/DecisionTable" Version="7.0">
        <Body>
          <Properties>
            <Property Name="Check.Overlap.ErrorLevel">Error</Property>
            <Property Name="Lock.ApplyLocking" Type="xs:boolean"><![CDATA[false]]></Property>
            <Property Name="UI.ShowInvisibleColumns" Type="xs:boolean"><![CDATA[true]]></Property>
            <Property Name="UI.ShowRuleView" Type="xs:boolean"><![CDATA[false]]></Property>
          </Properties>
          <Structure>
            <ConditionDefinitions>
              <ConditionDefinition Id="C0">
                <ExpressionDefinition>
                  <Properties>
                    <Property Name="context" Type="ilog.rules.dt.model.check.IlrDTExpressionChecker$IntervalContext">
                      <intervalContext direction="asc" enabled="false"/>
                    </Property>
                  </Properties>
                  <Text><![CDATA[the [property] of 'the [variable]' is at least <min> and less than <max>]]></Text>
                </ExpressionDefinition>
              </ConditionDefinition>
            </ConditionDefinitions>
            <ActionDefinitions>
              <ActionDefinition Id="A0">
                <ExpressionDefinition>
                  <Text><![CDATA[set 'the [result variable]' to 'the [result variable]' + <a number>]]></Text>
                </ExpressionDefinition>
              </ActionDefinition>
            </ActionDefinitions>
          </Structure>
          <Contents>
            <Partition DefId="C0">
              <Condition>
                <Expression>
                  <Text><![CDATA[<a number> is less than <a number>]]></Text>
                  <Param><![CDATA[1000]]></Param>
                </Expression>
                <ActionSet>
                  <Action DefId="A0">
                    <Expression>
                      <Param><![CDATA[10]]></Param>
                    </Expression>
                  </Action>
                </ActionSet>
              </Condition>
              <Condition>
                <Expression>
                  <Param><![CDATA[1000]]></Param>
                  <Param><![CDATA[5000]]></Param>
                </Expression>
                <ActionSet>
                  <Action DefId="A0">
                    <Expression>
                      <Param><![CDATA[50]]></Param>
                    </Expression>
                  </Action>
                </ActionSet>
              </Condition>
              <Condition>
                <Expression>
                  <Text><![CDATA[<a number> is at least <a number>]]></Text>
                  <Param><![CDATA[5000]]></Param>
                </Expression>
                <ActionSet>
                  <Action DefId="A0">
                    <Expression>
                      <Param><![CDATA[100]]></Param>
                    </Expression>
                  </Action>
                </ActionSet>
              </Condition>
            </Partition>
          </Contents>
        </Body>
        <Resources DefaultLocale="en_US">
          <ResourceSet Locale="en_US">
            <Data Name="Definitions(A0)#HeaderText"><![CDATA[Add to score]]></Data>
            <Data Name="Definitions(A0)#Width"><![CDATA[400]]></Data>
            <Data Name="Definitions(C0)#HeaderText"><![CDATA[Condition Range]]></Data>
            <Data Name="Definitions(C0)#Width"><![CDATA[400]]></Data>
            <Data Name="Definitions(C0)[0]#HeaderText"><![CDATA[Min]]></Data>
            <Data Name="Definitions(C0)[1]#HeaderText"><![CDATA[Max]]></Data>
          </ResourceSet>
        </Resources>
      </DT></definition>
      </model.dt:DecisionTable>

      **Key Decision Table Components:**

      1. **ConditionDefinitions**: Define the condition columns
         - Each ConditionDefinition has a unique Id (C0, C1, C2, etc.)
         - ExpressionDefinition contains the BAL condition template with placeholders
         - Use <min>, <max>, <value> as placeholders for parameters
         - intervalContext can enable automatic gap/overlap checking

      2. **ActionDefinitions**: Define the action columns
         - Each ActionDefinition has a unique Id (A0, A1, A2, etc.)
         - ExpressionDefinition contains the BAL action template with placeholders
         - Common patterns: set variable, add to score, assign category

      3. **Contents/Partition**: The actual table rows
         - Each Condition represents one row in the table
         - Expression contains the actual parameter values
         - Special expressions for first/last rows:
           * First row: <![CDATA[<a number> is less than <a number>]]> (open lower bound)
           * Last row: <![CDATA[<a number> is at least <a number>]]> (open upper bound)
           * Middle rows: Use min/max parameters from ConditionDefinition

      4. **Resources**: Column headers and display properties
         - HeaderText: Display name for condition/action columns
         - Width: Column width in pixels
         - Supports localization with different ResourceSet Locale values

      **Real-World Example - Credit Scoring by Income:**
      - Condition: Yearly income ranges (< 10K, 10K-20K, 20K-30K, etc.)
      - Action: Add points to credit score (21, 50, 80, 120, etc.)
      - First row handles income < 10,000 (open lower bound)
      - Last row handles income >= 200,000 (open upper bound)
      - Middle rows handle specific ranges with min/max values

      **Decision Table Best Practices:**
      1. Use decision tables for 5+ similar rules with same structure
      2. Enable overlap checking to catch conflicting conditions
      3. Use meaningful column headers in Resources section
      4. Handle edge cases with open bounds (first/last rows)
      5. Keep condition expressions simple - complex logic belongs in regular rules
      6. Use interval context for automatic gap detection in numeric ranges
      7. Test with boundary values to ensure correct range coverage


      Use these templates as reference. Adapt them to the specific business domain while maintaining the correct structure and format.
